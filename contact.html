<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="css/style.css">
    <title>Contact</title>
</head>

<body id="top">
    <!-- start header -->
    <header>
        <nav class="navbar">
            <div class="left-nav">
                <a class="navbar-brand" href="index.html"><img src="images/logo.png" class="img-fluid" alt="logo"
                        width="60">Nhu Ly Designer</a>
            </div>
            <div class="right-nav nav-item d-flex justify-content-end align-items-center gap-5">
                <a class="link-dark link-opacity-50-hover text-decoration-none" href="index.html">Home</a>
                <a class="link-dark link-opacity-50-hover text-decoration-none" href="projects.html">Projects</a>
                <a class="link-dark link-underline-opacity-25 link-underline-opacity-50-hover" href="contact.html">Contact</a>
            </div>
        </nav>
    </header>

    <!-- Start main -->
    <main>
        <div class="contact row container-md">
            <div class="form col-12 col-lg-5 align-self-center order-1">
                <h4>You have an issue or you need an advise
                </h4>
                <form action="submit">
                    <div class="mb-3 name">
                        <label for="inputname">Name</label>
                        <input type="text" class="form-control" placeholder="type your name here">
                    </div>
                    <div class="mb-3 email">
                        <label for="inputemail">Email address</label>
                        <input type="email" class="form-control" placeholder="type your email here">
                    </div>
                    <div class="mb-3 situation">
                        <label for="inputsituation">Your situation</label>
                        <select name="situation" id="situation" class="form-select mb-3">
                            <option value="1">I need a website</option>
                            <option value="2">I want to design an advertising product(poster, banner, catalogues…)
                            </option>
                            <option value="3">I need a management my website</option>
                            <option value="4">I have the other issues</option>
                        </select>
                    </div>
                    <div class="message mb-3">
                        <label for="inputmessage">Your message</label>
                        <input type="text" placeholder="your message here" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-dark">Submit</button>
                </form>
            </div>

            <div class="contact-img col-12 col-lg-5 order-3 justify-content-end">
                <img src="images/women.png" alt="contact-img" class="img-fluid">
                <div class="bg-black">
                    <p class="text-white text-center">Nhu Ly</p>
                    <p class="text-white text-center">+123 456 789 234  |  nhuly@gmail.com</p>
                </div>
            </div>
        </div>
    </main>

    <!-- start footer -->
    <footer class="d-flex justify-content-lg-between p-4">
        <div>
            <img src="images/logo.png" alt="footer-img" width="40px">
            <blockquote>© by Nhu Ly Designer 2024</blockquote>
        </div>
        <div class="pages d-flex flex-column">
            <a class="text-decoration-none text-black" href="index.html">Home</a>
            <a class="text-decoration-none text-black" href="projects.html">Projects</a>
            <a class="text-decoration-none text-black" href="Contact.html">Contact</a>
        </div>
        <div class="social-media d-flex flex-column">
            <a class="text-decoration-none text-black" href="#">Facebook</a>
            <a class="text-decoration-none text-black" href="#">Twitter</a>
            <a class="text-decoration-none text-black" href="#">Instagram</a>
        </div>
        <div class="footer-contact">
            <p>+44 345 678 903</p>
            <p>adobexd@mail.com</p>
        </div>
    </footer>

    <!-- added script -->
    <script scr="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
